name: Hourly Economist Pipeline

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour
  workflow_dispatch:
    inputs:
      limit:
        description: "Max articles from homepage"
        required: false
        default: "20"
      dry_run:
        description: "Skip AI/PDF/upload (debug)"
        required: false
        type: boolean
        default: false

jobs:
  run:
    name: scrape → translate → upload
    runs-on: ubuntu-latest
    timeout-minutes: 50  # Gemma 25s × 20 articles = ~10 min, plus buffer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install deps
        run: uv sync

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: economist-reader
        run: |
          ARGS="--limit ${{ inputs.limit || '20' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          uv run python cli.py $ARGS
